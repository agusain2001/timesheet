events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ─── Logging ─────────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent"';
    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    # ─── Performance ──────────────────────────────────────────────
    sendfile           on;
    tcp_nopush         on;
    tcp_nodelay        on;
    keepalive_timeout  65;
    gzip               on;
    gzip_types         text/plain text/css application/json application/javascript
                       text/xml application/xml application/xml+rss text/javascript;
    gzip_min_length    1000;

    # ─── Security Headers (supplement to FastAPI middleware) ─────
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ─── Rate Limiting ────────────────────────────────────────────
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
    limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/m;

    # ─── Upstream Services ───────────────────────────────────────
    upstream backend {
        server backend:8000;
        keepalive 16;
    }

    upstream frontend {
        server frontend:3000;
        keepalive 8;
    }

    # ─── HTTP → HTTPS Redirect ───────────────────────────────────
    server {
        listen 80;
        server_name _;
        return 301 https://$host$request_uri;
    }

    # ─── HTTPS Main Server ───────────────────────────────────────
    server {
        listen 443 ssl http2;
        server_name _;

        # SSL — replace with your cert paths
        ssl_certificate     /etc/nginx/certs/fullchain.pem;
        ssl_certificate_key /etc/nginx/certs/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 1d;

        # HSTS
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

        # Max upload size (for receipts, attachments)
        client_max_body_size 25M;

        # ─── Backend API ──────────────────────────────────────────
        location /api/ {
            limit_req zone=api burst=20 nodelay;

            proxy_pass         http://backend;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Connection        "";

            proxy_read_timeout  60s;
            proxy_send_timeout  60s;
            proxy_connect_timeout 10s;
        }

        # ─── Auth Rate Limit ──────────────────────────────────────
        location /api/auth/login {
            limit_req zone=auth burst=3 nodelay;
            limit_req_status 429;

            proxy_pass         http://backend;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # ─── WebSocket ────────────────────────────────────────────
        location /ws/ {
            proxy_pass         http://backend;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_set_header   Host       $host;
            proxy_set_header   X-Real-IP  $remote_addr;
            proxy_read_timeout 3600s;   # Keep WS connections alive
            proxy_send_timeout 3600s;
        }

        # ─── Uploaded Files (served directly by nginx) ────────────
        location /api/uploads/ {
            alias /app/uploads/;
            expires 7d;
            add_header Cache-Control "public, immutable";
        }

        # ─── Health Check (no rate limit) ────────────────────────
        location /health {
            proxy_pass http://backend;
            access_log off;
        }

        # ─── Frontend (Next.js) ───────────────────────────────────
        location / {
            proxy_pass         http://frontend;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Connection        "";
        }

        # ─── Next.js static assets ────────────────────────────────
        location /_next/static/ {
            proxy_pass http://frontend;
            expires    1y;
            add_header Cache-Control "public, immutable";
            access_log off;
        }
    }
}
