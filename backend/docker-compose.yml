# ════════════════════════════════════════════════════════════════
# Time Sheet — Backend Standalone Docker Compose
# ════════════════════════════════════════════════════════════════
#
# Services:
#   db       — PostgreSQL 16
#   backend  — FastAPI (Python 3.11, port 8000)
#
# Usage:
#   1. cp .env.example .env  (fill in all required values)
#   2. docker compose up -d
#   3. Open http://localhost:8000/docs
# ════════════════════════════════════════════════════════════════

services:

  # ─── PostgreSQL 16 ────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: timesheet_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-timesheet}
      POSTGRES_USER: ${POSTGRES_USER:-timesheet}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432" # Expose only for local dev — close this in production
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-timesheet} -d ${POSTGRES_DB:-timesheet}" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - backend_net

  # ─── FastAPI Backend ──────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    container_name: timesheet_backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      # Override DATABASE_URL to point to the containerised PostgreSQL
      DATABASE_URL: postgresql://${POSTGRES_USER:-timesheet}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-timesheet}
    volumes:
      # Persist uploaded files outside the container
      - uploads_data:/app/uploads
      - logs_data:/app/logs
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\"" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 25s
    networks:
      - backend_net

# ─── Named Volumes ────────────────────────────────────────────
volumes:
  postgres_data:
    driver: local
  uploads_data:
    driver: local
  logs_data:
    driver: local

# ─── Network ──────────────────────────────────────────────────
networks:
  backend_net:
    driver: bridge
