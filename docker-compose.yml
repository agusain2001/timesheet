# ════════════════════════════════════════════════════════════════
# Time Sheet — Full Stack Docker Compose
# ════════════════════════════════════════════════════════════════
#
# Services:
#   db       — PostgreSQL 16
#   backend  — FastAPI (Python 3.11, port 8000)
#   frontend — Next.js 16 (standalone, port 3000)
#   nginx    — Reverse proxy (ports 80 / 443)
#
# Quick Start:
#   1. cp backend/.env.example backend/.env  (fill in all values)
#   2. Set NEXT_PUBLIC_API_URL and POSTGRES_PASSWORD in environment or .env
#   3. docker compose up -d --build
#   4. Visit http://localhost (nginx)
# ════════════════════════════════════════════════════════════════

services:

  # ─── PostgreSQL 16 Database ───────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: timesheet_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-timesheet}
      POSTGRES_USER: ${POSTGRES_USER:-timesheet}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # Do NOT expose 5432 publicly in production
    # ports:
    #   - "5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-timesheet} -d ${POSTGRES_DB:-timesheet}" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - app_net

  # ─── FastAPI Backend ──────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: runtime
    container_name: timesheet_backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      # Override DATABASE_URL to point to the containerised DB
      DATABASE_URL: postgresql://${POSTGRES_USER:-timesheet}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-timesheet}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
    volumes:
      - uploads_data:/app/uploads
      - logs_data:/app/logs
    # Do NOT expose 8000 publicly in production (nginx proxies it)
    # ports:
    #   - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\"" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 25s
    networks:
      - app_net

  # ─── Next.js Frontend ─────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: runner
      args:
        # NEXT_PUBLIC_API_URL is baked in at BUILD TIME
        # Set to your public-facing API domain in production
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    container_name: timesheet_frontend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      NEXT_TELEMETRY_DISABLED: "1"
    # Do NOT expose 3000 publicly in production (nginx proxies it)
    # ports:
    #   - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "wget -qO- http://localhost:3000/ || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - app_net

  # ─── Nginx Reverse Proxy ──────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: timesheet_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro # Mount your SSL certs here
    depends_on:
      - frontend
      - backend
    networks:
      - app_net

# ─── Named Volumes ────────────────────────────────────────────
volumes:
  postgres_data:
    driver: local
  uploads_data:
    driver: local
  logs_data:
    driver: local

# ─── Internal Network ─────────────────────────────────────────
networks:
  app_net:
    driver: bridge
